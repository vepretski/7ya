<!DOCTYPE html>
<html lang="en">
<head>

  <title>7YA Member Pass</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-light font-sans">
  <div id="animation" class="legendary-animation">
    <div class="spinner"></div>
    <h2 class="title">Welcome to #7YA</h2>
  </div>
  <div id="content" class="hidden content-container">
    <h1>#7YA Member Circle</h1>
    <p>Join the movement and claim your digital 7YA Member Pass. This pass grants you access to our community, status, and rewards.</p>
    <a href="member.html?name=Igor%20Vepretski&amp;tier=Builder&amp;memberId=7YA-000777" class="btn">View Your Pass</a>
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const animation = document.getElementById('animation');
    const content = document.getElementById('content');
    setTimeout(() => {
      animation.style.display = 'none';
      content.classList.remove('hidden');
    }, 5000);
  });
